<script>const domain = ".example.com"; // change to your domain
const maxCookies = 180;
const maxBytes = 4096;

for (let i = 0; i < maxCookies; i++) {
  const name = `c${i}`;
  // fill value up to limit (accounting for name, =, and attributes)
  const overhead = `${name}=; domain=${domain}; path=/`.length;
  const value = "x".repeat(maxBytes - overhead);
  
  document.cookie = `${name}=${value}; domain=${domain}; path=/`;
}

// verify how many were set
const set = document.cookie.split(";").length;
console.log(`Cookies set: ${set}`);</script>
